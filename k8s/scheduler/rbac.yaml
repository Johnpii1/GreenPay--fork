# RBAC for the GreenPay custom scheduler.
#
# The scheduler needs:
#   - Read access to Nodes, Pods, PersistentVolumes, StorageClasses (same as
#     kube-scheduler; required by the scheduling framework internals).
#   - Write access to Events (to record scheduling decisions).
#   - Lease permissions (leader-election when running HA replicas).
#   - Binding/StatusUpdate on Pods (to actually assign pods to nodes).
#
# We use a dedicated ServiceAccount + ClusterRole rather than re-using the
# system:kube-scheduler role so permissions are explicit and auditable.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: greenpay-scheduler
  namespace: greenpay-scheduler
  labels:
    app.kubernetes.io/name: greenpay-scheduler
    app.kubernetes.io/component: scheduler
---
# ClusterRole — read everything the framework needs, write bindings/events.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: greenpay-scheduler
  labels:
    app.kubernetes.io/name: greenpay-scheduler
rules:
  # Node and Pod reads — required by the informer cache used by the framework.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Pod binding — required to actually schedule (assign node) a pod.
  - apiGroups: [""]
    resources: ["pods/binding"]
    verbs: ["create"]
  # Pod status updates — required by the scheduling framework for pod conditions.
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update", "patch"]
  # Events — scheduler publishes scheduling decisions as Events.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # PersistentVolumes and StorageClasses — used by VolumeBinding plugin.
  - apiGroups: [""]
    resources: ["persistentvolumes", "persistentvolumeclaims", "replicationcontrollers", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes", "csidrivers", "csistoragecapacities"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps — required for leader-election lock and scheduler config.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Leases — leader-election when running multiple replicas.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "list", "update"]
---
# Bind the ClusterRole to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: greenpay-scheduler
  labels:
    app.kubernetes.io/name: greenpay-scheduler
subjects:
  - kind: ServiceAccount
    name: greenpay-scheduler
    namespace: greenpay-scheduler
roleRef:
  kind: ClusterRole
  name: greenpay-scheduler
  apiGroup: rbac.authorization.k8s.io
---
# Role in the scheduler's own namespace for leader-election lease management.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: greenpay-scheduler-leader-election
  namespace: greenpay-scheduler
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: greenpay-scheduler-leader-election
  namespace: greenpay-scheduler
subjects:
  - kind: ServiceAccount
    name: greenpay-scheduler
    namespace: greenpay-scheduler
roleRef:
  kind: Role
  name: greenpay-scheduler-leader-election
  apiGroup: rbac.authorization.k8s.io
