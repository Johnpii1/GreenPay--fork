apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: greenpay
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # The API backend is a standard workload — use the default scheduler.
      # Only ML pods (summary-worker, ml-inference, ml-training) opt into
      # the greenpay-scheduler via schedulerName.
      schedulerName: default-scheduler
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: backend
      containers:
        - name: backend
          image: greenpay/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: greenpay-config
            - secretRef:
                name: greenpay-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: greenpay
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
